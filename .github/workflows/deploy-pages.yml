name: Deploy site (GitHub Pages)

# Build the learning platform (site/) and publish it to GitHub Pages as a project
# site at https://ai-first-community.github.io/Agent-Karma/. The site embeds the
# extension's PURE engine, so an engine change can also change the site.

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "extension/src/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One live deploy at a time; let a newer push supersede an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4 # whole repo so ../extension imports resolve
      - uses: actions/setup-node@v4
        with:
          node-version: "22" # Astro 6 requires Node >= 22.12
          cache: "npm"
          cache-dependency-path: site/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist # path is relative to the workspace root

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
