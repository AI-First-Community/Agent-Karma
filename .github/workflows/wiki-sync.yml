name: Wiki sync

# Mirror the canonical Starlight docs (site/src/content/docs/**) into the GitHub
# Wiki. The site is the single source of truth; the wiki is a generated, flat
# Markdown copy. Non-blocking and one-directional (docs → wiki, never back).

on:
  push:
    branches: [main]
    paths:
      - "site/src/content/docs/**"
      - "site/scripts/gen-wiki.mjs"
      - ".github/workflows/wiki-sync.yml"
  workflow_dispatch:

# Avoid concurrent pushes to the wiki repo clobbering each other.
concurrency:
  group: wiki-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # whole repo so ../extension imports resolve

      - uses: actions/setup-node@v4
        with:
          node-version: "22" # matches the site job (Astro 6 needs >=22.12)
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Generate the wiki from the docs
        working-directory: site
        env:
          SITE_URL: https://agentkarma.dev
        run: |
          npm ci
          npm run gen:wiki

      - name: Push to the wiki repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${REPO}.wiki.git"

          # The wiki repo may be empty until its first page exists — clone if we
          # can, otherwise start a fresh repo and point it at the wiki remote.
          if git clone "$REMOTE" wiki-repo 2>/dev/null && [ -d wiki-repo/.git ]; then
            echo "Cloned existing wiki."
          else
            echo "Wiki empty — initializing."
            rm -rf wiki-repo
            mkdir wiki-repo
            git -C wiki-repo init -q
            git -C wiki-repo remote add origin "$REMOTE"
          fi

          # Replace the generated pages wholesale (drop stale ones), keep .git.
          find wiki-repo -maxdepth 1 -name '*.md' -delete
          cp site/wiki/*.md wiki-repo/

          cd wiki-repo
          git config user.name "Agent Karma Docs"
          git config user.email "noreply@github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Wiki already up to date."
            exit 0
          fi
          git commit -q -m "docs(wiki): sync from site/src/content/docs (${GITHUB_SHA::7})"
          git branch -M master
          git push -u origin master
          echo "Wiki updated."
