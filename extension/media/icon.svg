<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#11161d"/>
      <stop offset="100%" stop-color="#0a0c10"/>
    </linearGradient>
    <linearGradient id="wheel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0b429"/>
      <stop offset="100%" stop-color="#e3870a"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="56" fill="url(#bg)"/>
  <rect x="6" y="6" width="244" height="244" rx="52" fill="none" stroke="#f0b429" stroke-opacity="0.18" stroke-width="2"/>
  <g stroke="url(#wheel)" stroke-linecap="round">
    <!-- rim -->
    <circle cx="128" cy="128" r="84" fill="none" stroke-width="7"/>
    <!-- 12 spokes, hub to rim -->
    <g stroke-width="6">
      <line x1="148" y1="128" x2="204" y2="128"/>
      <line x1="145.3" y1="138" x2="193.8" y2="166"/>
      <line x1="138" y1="145.3" x2="166" y2="193.8"/>
      <line x1="128" y1="148" x2="128" y2="204"/>
      <line x1="118" y1="145.3" x2="90" y2="193.8"/>
      <line x1="110.7" y1="138" x2="62.2" y2="166"/>
      <line x1="108" y1="128" x2="52" y2="128"/>
      <line x1="110.7" y1="118" x2="62.2" y2="90"/>
      <line x1="118" y1="110.7" x2="90" y2="62.2"/>
      <line x1="128" y1="108" x2="128" y2="52"/>
      <line x1="138" y1="110.7" x2="166" y2="62.2"/>
      <line x1="145.3" y1="118" x2="193.8" y2="90"/>
    </g>
  </g>
  <!-- hub -->
  <circle cx="128" cy="128" r="14" fill="url(#wheel)"/>
</svg>
